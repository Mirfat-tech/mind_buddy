<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email verified</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5efe4;
        color: #1f1a14;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 560px);
        background: #fffaf0;
        border: 1px solid #eadcc4;
        border-radius: 24px;
        padding: 32px 24px;
        box-sizing: border-box;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.15;
      }
      p {
        margin: 0 0 16px;
        font-size: 16px;
        line-height: 1.5;
      }
      .actions {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }
      .button {
        display: inline-block;
        padding: 14px 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }
      .primary {
        background: #1f1a14;
        color: #fffaf0;
      }
      .secondary {
        border: 1px solid #c9b79d;
        color: #1f1a14;
      }
      .muted {
        color: #6a5845;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>Email verified</h1>
        <p>Your MyBrainBubble email confirmation has been completed.</p>
        <p>You can return to the app and sign in to continue.</p>
        <div class="actions">
          <a id="open-app" class="button primary" href="#">Open MyBrainBubble</a>
          <a class="button secondary" href="/signin">Go to sign in</a>
        </div>
        <p class="muted">
          If the app does not open automatically, switch back to it manually and
          sign in there.
        </p>
      </section>
    </main>
    <script>
      (function () {
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var target = "brainbubble://auth/callback" + search + hash;
        var link = document.getElementById("open-app");
        if (link) link.href = target;
      })();
    </script>
  </body>
</html>
