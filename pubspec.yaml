name: mind_buddy
description: MyBrainBubble app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^6.6.0  # For voice input
  permission_handler: ^11.0.0  # For microphone permissions
  audio_session: ^0.2.2
  fl_chart: ^0.66.0
  flame: ^1.35.1
   
  flutter_quill: ^11.5.0
  video_player: ^2.9.2
  share_plus: ^10.1.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  file_picker: ^8.0.6

  # 🌐 Networking
  http: ^1.2.2
  dio: ^5.7.0

  # ☁️ Backend & auth
  supabase_flutter: ^2.5.6
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.5

  # 🌱 State management
  flutter_riverpod: ^2.5.1
  provider: ^6.0.0

  # 🧭 Navigation
  go_router: ^14.2.7

  # 🔐 Secure local storage
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  sign_in_with_apple: ^6.1.4

  # 💾 Simple key-value storage
  shared_preferences: ^2.3.3
  device_info_plus: ^10.1.0

  # 🧾 App version info
  package_info_plus: ^8.0.2

  # 🔗 Open URLs
  url_launcher: ^6.3.1

  table_calendar: ^3.1.2
  equatable: ^2.0.7
  logger: ^2.5.0
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  app_links: ^6.4.1
  home_widget: ^0.7.0
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0+5
  tutorial_coach_mark: ^1.2.11
  flutter_markdown: ^0.7.7+1
  flutter_colorpicker: ^1.1.0

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

dependency_overrides:
  in_app_purchase_storekit:
    path: third_party/in_app_purchase_storekit
  path_provider_foundation:
    path: third_party/path_provider_foundation

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/bubble_pool/items/
    - assets/legal/terms.md
    - assets/legal/privacy.md
