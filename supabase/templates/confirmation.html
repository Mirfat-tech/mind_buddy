<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your email</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 24px 16px;
      background: #f5efe4;
      color: #1f1a14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    "
  >
    <div
      style="
        max-width: 560px;
        margin: 0 auto;
        background: #fffaf0;
        border: 1px solid #eadcc4;
        border-radius: 20px;
        padding: 28px 24px;
      "
    >
      <div style="font-size: 13px; color: #7a6650; margin-bottom: 16px;">
        MyBrainBubble
      </div>
      <h1
        style="
          margin: 0 0 12px;
          font-size: 28px;
          line-height: 1.2;
          color: #1f1a14;
        "
      >
        Confirm your email
      </h1>
      <p style="margin: 0 0 18px; font-size: 16px; line-height: 1.5;">
        Tap the button below to finish creating your MyBrainBubble account.
      </p>
      <p style="margin: 0 0 22px;">
        <a
          href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=signup"
          style="
            display: inline-block;
            padding: 14px 20px;
            border-radius: 999px;
            background: #1f1a14;
            color: #fffaf0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
          "
          >Confirm email</a
        >
      </p>
      <p style="margin: 0 0 12px; font-size: 14px; line-height: 1.5;">
        If the button does not work, copy and paste this link into your browser:
      </p>
      <p
        style="
          margin: 0;
          font-size: 13px;
          line-height: 1.5;
          word-break: break-all;
          color: #6a5845;
        "
      >
        {{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=signup
      </p>
    </div>
  </body>
</html>
